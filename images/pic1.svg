<svg width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea" />
      <stop offset="100%" stop-color="#764ba2" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bgGradient)" />
  
  <!-- 篮球场景 -->
  <g transform="translate(200, 150)">
    <!-- 篮球场 -->
    <rect x="-150" y="-50" width="300" height="200" fill="rgba(255,255,255,0.1)" rx="10" />
    
    <!-- 篮球架 -->
    <rect x="100" y="-80" width="10" height="120" fill="rgba(255,255,255,0.8)" />
    <rect x="70" y="-80" width="40" height="5" fill="rgba(255,255,255,0.8)" />
    <circle cx="60" cy="-60" r="20" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="3" />
    
    <!-- 篮球运动员1 -->
    <g transform="translate(-80, 30)">
      <circle cx="0" cy="-30" r="15" fill="#ffccbc" />
      <path d="M-10,0 L-10,40 M10,0 L10,40 M-15,10 L15,10" stroke="rgba(255,255,255,0.8)" stroke-width="3" fill="none" />
      <circle cx="-5" cy="-30" r="2" fill="white" />
      <circle cx="5" cy="-30" r="2" fill="white" />
      <path d="M-5,-20 Q0,-15 5,-20" stroke="white" stroke-width="1" fill="none" />
    </g>
    
    <!-- 篮球运动员2 -->
    <g transform="translate(0, 20)">
      <circle cx="0" cy="-30" r="15" fill="#ffe0b2" />
      <path d="M-10,0 L-10,40 M10,0 L10,40 M-15,10 L15,10" stroke="rgba(255,255,255,0.8)" stroke-width="3" fill="none" />
      <circle cx="-5" cy="-30" r="2" fill="white" />
      <circle cx="5" cy="-30" r="2" fill="white" />
      <path d="M-5,-20 Q0,-15 5,-20" stroke="white" stroke-width="1" fill="none" />
    </g>
    
    <!-- 篮球 -->
    <circle cx="40" cy="0" r="12" fill="#f44336">
      <animate attributeName="cx" values="40;30;20;10;0;-10" dur="2s" repeatCount="indefinite" />
      <animate attributeName="cy" values="0;-20;-30;-20;0;20" dur="2s" repeatCount="indefinite" />
    </circle>
  </g>
  
  <text x="200" y="280" text-anchor="middle" fill="white" font-size="16" font-family="Arial" font-weight="bold">篮球比赛</text>
</svg>