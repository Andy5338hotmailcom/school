<svg width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f093fb" />
      <stop offset="100%" stop-color="#f5576c" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bgGradient)" />
  
  <!-- 舞台表演场景 -->
  <g transform="translate(200, 150)">
    <!-- 舞台 -->
    <rect x="-150" y="50" width="300" height="50" fill="rgba(255,255,255,0.2)" />
    
    <!-- 舞台灯光 -->
    <path d="M-100,-100 L-50,50 M-50,-100 L0,50 M0,-100 L50,50 M50,-100 L100,50" stroke="rgba(255,255,255,0.3)" stroke-width="2" />
    
    <!-- 表演者1 -->
    <g transform="translate(-80, 30)">
      <circle cx="0" cy="-40" r="15" fill="#ffccbc" />
      <path d="M-8,0 L-8,40 M8,0 L8,40 M-12,10 L12,10" stroke="rgba(255,255,255,0.8)" stroke-width="3" fill="none" />
      <path d="M-15,-20 L15,-20 L0,-40 Z" fill="rgba(255,255,255,0.8)">
        <animate attributeName="d" values="M-15,-20 L15,-20 L0,-40 Z;M-18,-25 L18,-25 L0,-45 Z;M-15,-20 L15,-20 L0,-40 Z" dur="1s" repeatCount="indefinite" />
      </path>
    </g>
    
    <!-- 表演者2 -->
    <g transform="translate(-20, 20)">
      <circle cx="0" cy="-45" r="15" fill="#ffe0b2" />
      <path d="M-8,0 L-8,40 M8,0 L8,40 M-12,10 L12,10" stroke="rgba(255,255,255,0.8)" stroke-width="3" fill="none" />
      <path d="M-15,-20 L15,-20 L0,-40 Z" fill="rgba(255,255,255,0.8)">
        <animate attributeName="d" values="M-15,-20 L15,-20 L0,-40 Z;M-12,-25 L12,-25 L0,-35 Z;M-15,-20 L15,-20 L0,-40 Z" dur="1.2s" repeatCount="indefinite" />
      </path>
    </g>
    
    <!-- 表演者3 -->
    <g transform="translate(40, 25)">
      <circle cx="0" cy="-42" r="15" fill="#b3e5fc" />
      <path d="M-8,0 L-8,40 M8,0 L8,40 M-12,10 L12,10" stroke="rgba(255,255,255,0.8)" stroke-width="3" fill="none" />
      <path d="M-15,-20 L15,-20 L0,-40 Z" fill="rgba(255,255,255,0.8)">
        <animate attributeName="d" values="M-15,-20 L15,-20 L0,-40 Z;M-10,-25 L10,-25 L0,-38 Z;M-15,-20 L15,-20 L0,-40 Z" dur="0.8s" repeatCount="indefinite" />
      </path>
    </g>
    
    <!-- 音符 -->
    <g transform="translate(100, -50)">
      <circle cx="0" cy="0" r="5" fill="rgba(255,255,255,0.6)">
        <animate attributeName="cy" values="0;-10;0" dur="2s" repeatCount="indefinite" />
      </circle>
      <path d="M0,0 L5,15 M5,5 L15,5" stroke="rgba(255,255,255,0.6)" stroke-width="2" fill="none">
        <animate attributeName="transform" values="translate(0,0);translate(0,-10);translate(0,0)" dur="2s" repeatCount="indefinite" />
      </path>
    </g>
    
    <g transform="translate(80, -30)">
      <circle cx="0" cy="0" r="4" fill="rgba(255,255,255,0.6)">
        <animate attributeName="cy" values="0;-8;0" dur="1.5s" repeatCount="indefinite" />
      </circle>
      <path d="M0,0 L4,12 M4,4 L12,4" stroke="rgba(255,255,255,0.6)" stroke-width="2" fill="none">
        <animate attributeName="transform" values="translate(0,0);translate(0,-8);translate(0,0)" dur="1.5s" repeatCount="indefinite" />
      </path>
    </g>
  </g>
  
  <text x="200" y="280" text-anchor="middle" fill="white" font-size="16" font-family="Arial" font-weight="bold">文化表演</text>
</svg>