<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea" />
      <stop offset="50%" stop-color="#764ba2" />
      <stop offset="100%" stop-color="#f093fb" />
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bgGradient)" />
  <g transform="translate(300, 200)">
    <!-- 抽象创意图形 -->
    <rect x="-150" y="-100" width="300" height="200" rx="20" fill="rgba(255,255,255,0.1)" />
    <circle cx="-100" cy="-50" r="20" fill="rgba(255,255,255,0.3)">
      <animate attributeName="r" values="20;30;20" dur="3s" repeatCount="indefinite" />
    </circle>
    <circle cx="0" cy="-70" r="15" fill="rgba(255,255,255,0.4)">
      <animate attributeName="r" values="15;25;15" dur="4s" repeatCount="indefinite" />
    </circle>
    <circle cx="100" cy="-40" r="25" fill="rgba(255,255,255,0.2)">
      <animate attributeName="r" values="25;15;25" dur="5s" repeatCount="indefinite" />
    </circle>
    <rect x="-80" y="20" width="40" height="40" rx="5" fill="rgba(255,255,255,0.3)">
      <animate attributeName="width" values="40;60;40" dur="3s" repeatCount="indefinite" />
    </rect>
    <rect x="20" y="10" width="30" height="50" rx="5" fill="rgba(255,255,255,0.4)">
      <animate attributeName="height" values="50;30;50" dur="4s" repeatCount="indefinite" />
    </rect>
  </g>
  <text x="300" y="350" text-anchor="middle" fill="white" font-size="24" font-family="Arial" font-weight="bold">创新思维</text>
</svg>